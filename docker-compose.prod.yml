services:
  postgres:
    image: postgres:16-alpine
    container_name: anytoolai-payments-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anytoolai}
      POSTGRES_USER: ${POSTGRES_USER:-anytoolai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anytoolai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anytoolai} -d ${POSTGRES_DB:-anytoolai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: anytoolai-payments-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://anytoolai:anytoolai@postgres:5432/anytoolai}
      CLOUDPAYMENTS_PUBLIC_ID: ${CLOUDPAYMENTS_PUBLIC_ID:-}
      CLOUDPAYMENTS_API_SECRET: ${CLOUDPAYMENTS_API_SECRET:-}
      CLOUDPAYMENTS_ENABLED: ${CLOUDPAYMENTS_ENABLED:-false}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
    ports:
      - "${API_PORT:-8000}:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_CLOUDPAYMENTS_PUBLIC_ID: ${NEXT_PUBLIC_CLOUDPAYMENTS_PUBLIC_ID:-}
        NEXT_PUBLIC_CLOUDPAYMENTS_ENABLED: ${NEXT_PUBLIC_CLOUDPAYMENTS_ENABLED:-false}
    container_name: anytoolai-payments-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_CLOUDPAYMENTS_PUBLIC_ID: ${NEXT_PUBLIC_CLOUDPAYMENTS_PUBLIC_ID:-}
      NEXT_PUBLIC_CLOUDPAYMENTS_ENABLED: ${NEXT_PUBLIC_CLOUDPAYMENTS_ENABLED:-false}
    ports:
      - "${WEB_PORT:-80}:3000"

volumes:
  postgres_data:
