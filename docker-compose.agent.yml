services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      observability:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLOUDPAYMENTS_PUBLIC_ID: ${CLOUDPAYMENTS_PUBLIC_ID:-}
      CLOUDPAYMENTS_API_SECRET: ${CLOUDPAYMENTS_API_SECRET:-}
      CLOUDPAYMENTS_ENABLED: ${CLOUDPAYMENTS_ENABLED:-false}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://observability:4318}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-payment-portal-api}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=2)"
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_CLOUDPAYMENTS_PUBLIC_ID: ${NEXT_PUBLIC_CLOUDPAYMENTS_PUBLIC_ID:-}
        NEXT_PUBLIC_CLOUDPAYMENTS_ENABLED: ${NEXT_PUBLIC_CLOUDPAYMENTS_ENABLED:-false}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_CLOUDPAYMENTS_PUBLIC_ID: ${NEXT_PUBLIC_CLOUDPAYMENTS_PUBLIC_ID:-}
      NEXT_PUBLIC_CLOUDPAYMENTS_ENABLED: ${NEXT_PUBLIC_CLOUDPAYMENTS_ENABLED:-false}
    ports:
      - "${WEB_PORT}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/ru').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 20

  observability:
    image: ${OTEL_LGTM_IMAGE:-grafana/otel-lgtm:0.11.10}
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT}:3000"
      - "${LOKI_PORT}:3100"
      - "${PROMETHEUS_PORT}:9090"
      - "${TEMPO_PORT}:3200"
      - "${OTLP_GRPC_PORT}:4317"
      - "${OTLP_HTTP_PORT}:4318"
