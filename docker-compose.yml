services:
  postgres:
    image: postgres:16-alpine
    container_name: anytoolai-payments-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anytoolai}
      POSTGRES_USER: ${POSTGRES_USER:-anytoolai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anytoolai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anytoolai} -d ${POSTGRES_DB:-anytoolai}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
