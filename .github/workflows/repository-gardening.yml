name: Repository gardening

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Run repository audit
        id: audit
        continue-on-error: true
        run: |
          python scripts/repo.py docs check 2>&1 | tee gardening-report.txt
          python scripts/repo.py architecture check 2>&1 | tee -a gardening-report.txt
      - name: Open or update maintenance issue
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const title = "[Gardening] Repository quality drift detected";
            const fs = require("fs");
            const report = fs.readFileSync("gardening-report.txt", "utf8").slice(0, 60000);
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });
            const existing = data.find(issue => issue.title === title);
            const body = `Scheduled agent-legibility checks failed.\n\n\`\`\`text\n${report}\n\`\`\``;
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }
