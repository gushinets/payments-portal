name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
      - name: Install API dependencies
        run: python -m pip install -r apps/api/requirements-dev.txt
      - name: Install web dependencies
        run: npm ci
      - name: Run fast checks
        run: npm run check:fast
      - name: Type-check web
        run: npm run typecheck:web
      - name: Build web
        run: npm run build:web

  production-gate:
    name: Production gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: payment_portal_test
          POSTGRES_USER: anytoolai
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anytoolai -d payment_portal_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI_ARTIFACTS: .harness/ci
      COMPOSE_PROJECT_NAME: payment-portal-ci-${{ github.run_id }}-${{ github.run_attempt }}
      POSTGRES_DB: payment_portal_test
      POSTGRES_USER: anytoolai
      API_PORT: "8000"
      WEB_PORT: "3000"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      CORS_ALLOW_ORIGINS: http://localhost:3000
      CLOUDPAYMENTS_ENABLED: "false"
      NEXT_PUBLIC_CLOUDPAYMENTS_ENABLED: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt
      - name: Install API dependencies
        run: python -m pip install -r apps/api/requirements-dev.txt
      - name: Create private CI environment
        shell: bash
        run: |
          mkdir -p "$CI_ARTIFACTS"
          ci_env="$RUNNER_TEMP/payment-portal-ci.env"
          database_url="postgresql+psycopg://${POSTGRES_USER}@127.0.0.1:5432/${POSTGRES_DB}"
          echo "::add-mask::$database_url"
          {
            echo "TEST_POSTGRES_DATABASE_URL=$database_url"
            echo "DATABASE_URL=$database_url"
            echo "POSTGRES_DB=$POSTGRES_DB"
            echo "POSTGRES_USER=$POSTGRES_USER"
            echo "POSTGRES_HOST_AUTH_METHOD=trust"
            echo "API_PORT=$API_PORT"
            echo "WEB_PORT=$WEB_PORT"
            echo "NEXT_PUBLIC_API_BASE_URL=$NEXT_PUBLIC_API_BASE_URL"
            echo "CORS_ALLOW_ORIGINS=$CORS_ALLOW_ORIGINS"
            echo "CLOUDPAYMENTS_ENABLED=$CLOUDPAYMENTS_ENABLED"
            echo "NEXT_PUBLIC_CLOUDPAYMENTS_ENABLED=$NEXT_PUBLIC_CLOUDPAYMENTS_ENABLED"
          } > "$ci_env"
          echo "CI_ENV_FILE=$ci_env" >> "$GITHUB_ENV"
      - name: Run PostgreSQL migration cycle
        shell: bash
        run: |
          set -a
          source "$CI_ENV_FILE"
          set +a
          python -m pytest apps/api/tests/test_alembic_postgres.py \
            --junitxml="$CI_ARTIFACTS/postgres-junit.xml" \
            2>&1 | tee "$CI_ARTIFACTS/postgres-pytest.log"
      - name: Validate Compose configuration
        shell: bash
        run: |
          docker compose --env-file "$CI_ENV_FILE" -f docker-compose.yml config --quiet
          docker compose --env-file "$CI_ENV_FILE" -f docker-compose.prod.yml config --quiet
      - name: Build production images
        shell: bash
        run: |
          docker compose --progress plain --env-file "$CI_ENV_FILE" \
            -f docker-compose.prod.yml build api web \
            2>&1 | tee "$CI_ARTIFACTS/production-build.log"
      - name: Smoke API image
        shell: bash
        run: |
          api_image="${COMPOSE_PROJECT_NAME}-api"
          docker image inspect "$api_image" > /dev/null
          docker run --detach --name payment-portal-api-smoke --network host \
            --env-file "$CI_ENV_FILE" "$api_image"

          for attempt in $(seq 1 30); do
            if curl --silent --show-error --fail \
              http://127.0.0.1:8000/health/ready \
              | python -c 'import json, sys; assert json.load(sys.stdin)["status"] == "ready"'; then
              exit 0
            fi
            if ! docker container inspect --format '{{.State.Running}}' \
              payment-portal-api-smoke 2>/dev/null | grep --quiet true; then
              exit 1
            fi
            sleep 2
          done
          exit 1
      - name: Collect failure diagnostics
        if: failure()
        shell: bash
        run: |
          mkdir -p "$CI_ARTIFACTS"
          docker logs payment-portal-api-smoke \
            > "$CI_ARTIFACTS/api-container.log" 2>&1 || true
          docker logs "${{ job.services.postgres.id }}" \
            > "$CI_ARTIFACTS/postgres-container.log" 2>&1 || true
          docker ps --all --format '{{.Names}}\t{{.Image}}\t{{.Status}}' \
            > "$CI_ARTIFACTS/docker-containers.txt" || true
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: production-gate-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: .harness/ci/
          if-no-files-found: warn
          retention-days: 7
      - name: Stop smoke container
        if: always()
        run: docker rm --force payment-portal-api-smoke 2>/dev/null || true

  harness-smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: python scripts/repo.py harness-smoke
      - run: python scripts/repo.py pr-title "ANY-108 - Validate harness"

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
      - run: python -m pip install -r apps/api/requirements-dev.txt
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: python scripts/repo.py up
      - run: npm run test:e2e
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-evidence
          path: .harness/
      - name: Stop isolated stack
        if: always()
        run: python scripts/repo.py down
