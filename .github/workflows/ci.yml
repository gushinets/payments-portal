name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
      - run: python -m pip install -r apps/api/requirements-dev.txt
      - run: npm ci
      - run: npm run check:fast
      - run: npm run build:web

  postgres-migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: payment_portal_test
          POSTGRES_USER: anytoolai
          POSTGRES_PASSWORD: anytoolai-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anytoolai -d payment_portal_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_POSTGRES_DATABASE_URL: postgresql+psycopg://anytoolai:anytoolai-test@localhost:5432/payment_portal_test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r apps/api/requirements-dev.txt
      - run: python -m pytest apps/api/tests/test_alembic_postgres.py

  harness-smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: python scripts/repo.py harness-smoke
      - run: python scripts/repo.py pr-title "ANY-108 - Validate harness"

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
      - run: python -m pip install -r apps/api/requirements-dev.txt
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: python scripts/repo.py up
      - run: npm run test:e2e
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-evidence
          path: .harness/
      - name: Stop isolated stack
        if: always()
        run: python scripts/repo.py down
